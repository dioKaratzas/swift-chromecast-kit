name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true

  - type: input
    id: version
    attributes:
      label: ChromecastKit version
      placeholder: "e.g. 0.1.0 or main"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Platform / OS / device (optional)
      placeholder: "e.g. iOS 18.1 + Chromecast Ultra"

  - type: textarea
    id: logs
    attributes:
      label: Logs or code snippet (optional)
      render: shell
