changelog:
  exclude:
    labels:
      - skip-changelog
      - no-release-notes
      - dependencies
    authors:
      - github-actions[bot]
      - dependabot[bot]
  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - breaking-change
        - breaking
    - title: "🚀 Features"
      labels:
        - feat
        - feature
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - fix
        - bug
        - bugfix
    - title: "🧪 Tests & CI"
      labels:
        - test
        - ci
    - title: "⚡ Performance"
      labels:
        - perf
    - title: "📚 Documentation"
      labels:
        - docs
    - title: "🧩 Examples"
      labels:
        - example
        - examples
    - title: "🧹 Maintenance"
      labels:
        - chore
        - refactor
        - build
    - title: "Other Changes"
      labels:
        - "*"
