syntax = "proto2";

package extensions.api.cast_channel;

// Minimal Cast v2 envelope schema used by Chromecast sender channels.
// This file is intentionally limited to CastMessage for the optional
// SwiftProtobuf-generated envelope path.
message CastMessage {
  enum ProtocolVersion {
    CASTV2_1_0 = 0;
  }

  enum PayloadType {
    STRING = 0;
    BINARY = 1;
  }

  required ProtocolVersion protocol_version = 1;
  required string source_id = 2;
  required string destination_id = 3;
  required string namespace = 4;
  required PayloadType payload_type = 5;
  optional string payload_utf8 = 6;
  optional bytes payload_binary = 7;
}
